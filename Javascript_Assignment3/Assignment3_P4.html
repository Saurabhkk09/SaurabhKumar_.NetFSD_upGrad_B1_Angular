<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Expense Tracker</title>
    <style>
        :root {
            --primary: #4a90e2;
            --danger: #e74c3c;
            --success: #2ecc71;
            --bg: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; color: #333; margin-top: 0; }

        .input-group { margin-bottom: 15px; }
        
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        
        input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }

        .actions { display: flex; gap: 10px; margin-top: 20px; }

        button { 
            flex: 1;
            padding: 12px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-add { background: var(--success); color: white; }
        .btn-view { background: var(--primary); color: white; }
        
        #totalDisplay {
            text-align: center;
            font-size: 1.2rem;
            margin: 20px 0;
            padding: 10px;
            background: #eef2f7;
            border-radius: 8px;
        }

        .expense-list { margin-top: 20px; border-top: 2px solid #eee; }

        .expense-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 12px 0; 
            border-bottom: 1px solid #eee;
        }

        .expense-info b { display: block; color: #2c3e50; }
        .expense-info small { color: #7f8c8d; }

        .btn-delete { 
            background: var(--danger); 
            color: white; 
            padding: 5px 10px; 
            font-size: 0.8rem;
            flex: none; 
        }

        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Tracker</h2>

    <div class="input-group">
        <label>Expense Title</label>
        <input type="text" id="title" placeholder="e.g., Grocery">
    </div>
    <div class="input-group">
        <label>Amount ($)</label>
        <input type="number" id="amount" placeholder="0.00">
    </div>
    <div class="input-group">
        <label>Date</label>
        <input type="date" id="date">
    </div>

    <div class="actions">
        <button class="btn-add" onclick="addExpense()">Add Expense</button>
        <button class="btn-view" onclick="renderExpenses()">Refresh List</button>
    </div>

    <div id="totalDisplay">Total: $0.00</div>

    <div id="expenseList" class="expense-list">
        </div>
</div>

<script>
    
    const db = openDatabase('ExpenseDB', '1.0', 'Client Side Expense Tracker', 2 * 1024 * 1024);

    db.transaction(function (tx) {
        tx.executeSql(
            'CREATE TABLE IF NOT EXISTS EXPENSES (id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT, amount REAL, date TEXT)',
            [],
            () => console.log("Database & Table Ready"),
            (tx, err) => console.error("Initialization Error: ", err.message)
        );
    });


    function addExpense() {
        const title = document.getElementById('title').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const date = document.getElementById('date').value;

        if (!title || isNaN(amount) || !date) {
            alert("Please fill in all fields correctly.");
            return;
        }

        db.transaction(function (tx) {
            tx.executeSql(
                'INSERT INTO EXPENSES (title, amount, date) VALUES (?, ?, ?)',
                [title, amount, date],
                function () {
                    console.log("Record inserted successfully");
                    clearInputs();
                    renderExpenses(); 
                },
                (tx, err) => alert("Error saving data: " + err.message)
            );
        });
    }

    function renderExpenses() {
        db.transaction(function (tx) {
            tx.executeSql('SELECT * FROM EXPENSES ORDER BY date DESC', [], function (tx, results) {
                const listContainer = document.getElementById('expenseList');
                const totalDisplay = document.getElementById('totalDisplay');
                let html = '';
                let total = 0;

                const rows = results.rows;
                for (let i = 0; i < rows.length; i++) {
                    const item = rows.item(i);
                    total += item.amount;
                    html += `
                        <div class="expense-item">
                            <div class="expense-info">
                                <b>${item.title}</b>
                                <small>${item.date} — $${item.amount.toFixed(2)}</small>
                            </div>
                            <button class="btn-delete" onclick="deleteExpense(${item.id})">Delete</button>
                        </div>
                    `;
                }

                listContainer.innerHTML = rows.length > 0 ? html : '<p style="text-align:center; color:#999;">No expenses found.</p>';
                totalDisplay.innerText = `Total: $${total.toFixed(2)}`;
            });
        });
    }

    function deleteExpense(id) {
        if (!confirm("Are you sure you want to delete this expense?")) return;

        db.transaction(function (tx) {
            tx.executeSql(
                'DELETE FROM EXPENSES WHERE id = ?',
                [id],
                function () {
                    renderExpenses();
                },
                (tx, err) => alert("Delete Error: " + err.message)
            );
        });
    }

    
    function clearInputs() {
        document.getElementById('title').value = '';
        document.getElementById('amount').value = '';
        document.getElementById('date').value = '';
    }

    window.onload = renderExpenses;
</script>

</body>
</html>
