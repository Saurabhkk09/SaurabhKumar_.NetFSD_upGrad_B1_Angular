<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App - Level 2</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.2rem; color: #555; }
        #counter-display {
            display: block;
            font-size: 4rem;
            margin: 1rem 0;
            color: #333;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: opacity 0.2s;
        }
        #increment-btn { background-color: #4CAF50; color: white; }
        #reset-btn { background-color: #f44336; color: white; margin-left: 10px; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Current Count</h1>
        <span id="counter-display">0</span>
        
        <div class="controls">
            <button id="increment-btn">Increment</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script>
        let counterValue = 0;

        const display = document.getElementById('counter-display');

        function incrementCounter(step) {
            counterValue += step;
            
            display.textContent = counterValue;
        }

        function resetCounter() {
            counterValue = 0;
            display.textContent = counterValue;
        }

        document.getElementById('increment-btn').addEventListener('click', function() {
            incrementCounter(1);
        });

        document.getElementById('reset-btn').addEventListener('click', resetCounter);
    </script>

</body>
</html>
