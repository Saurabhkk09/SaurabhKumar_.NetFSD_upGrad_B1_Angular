<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f4f7f6;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        #profile-card {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        .student-info {
            text-align: left;
            line-height: 1.6;
        }

        .highlight {
            color: #2c3e50;
            font-weight: bold;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex-grow: 1;
        }

        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Profile</h2>
    
    <div id="profile-card">
        </div>

    <div class="controls">
        <input type="number" id="marksInput" placeholder="New Marks">
        <button onclick="handleUpdate()">Update</button>
    </div>
</div>

<script>
    let student = {
        name: "Jordan Smith",
        rollNo: "CS-2024-08",
        marks: 78
    };

    
    function updateStudentProfile(studentObj) {
        const display = document.getElementById('profile-card');
        
        display.innerHTML = `
            <div class="student-info">
                <p>Name: <span class="highlight">${studentObj.name}</span></p>
                <p>Roll No: <span class="highlight">${studentObj.rollNo}</span></p>
                <p>Marks: <span class="highlight">${studentObj.marks}%</span></p>
            </div>
        `;
    }

    function updateMarks(newMarks) {
        if (newMarks >= 0 && newMarks <= 100) {
            student.marks = newMarks;
            updateStudentProfile(student);
        } else {
            alert("Please enter a valid mark between 0 and 100.");
        }
    }

   
    function handleUpdate() {
        const input = document.getElementById('marksInput');
        const newValue = parseInt(input.value);
        
        if (!isNaN(newValue)) {
            updateMarks(newValue);
            input.value = ''; 
        }
    }

    updateStudentProfile(student);
</script>

</body>
</html>
