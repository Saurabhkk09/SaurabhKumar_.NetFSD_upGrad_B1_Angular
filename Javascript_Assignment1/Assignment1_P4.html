<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic Signal Simulator</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .container { border: 2px solid #333; padding: 20px; border-radius: 10px; text-align: center; }
        input { padding: 8px; margin-bottom: 10px; }
        button { padding: 8px 15px; cursor: pointer; background-color: #007BFF; color: white; border: none; border-radius: 5px; }
        #output { margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: #d9534f; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚦 Traffic Signal Simulator</h2>
        <p>Enter a color (Red, Yellow, Green):</p>
        
        <input type="text" id="signalInput" placeholder="Enter color...">
        <button onclick="checkSignal()">Check Light</button>

        <div id="output"></div>
    </div>

    <script>
        function checkSignal() {
            const signal = document.getElementById('signalInput').value;
            const display = document.getElementById('output');

            switch (signal.toLowerCase().trim()) {
                case "red":
                    console.log("Stop");
                    display.innerText = "Instruction: STOP";
                    display.style.color = "red";
                    break;

                case "yellow":
                    console.log("Get Ready");
                    display.innerText = "Instruction: GET READY";
                    display.style.color = "orange";
                    break;

                case "green":
                    console.log("Go");
                    display.innerText = "Instruction: GO";
                    display.style.color = "green";
                    break;

                default:
                    console.log("Invalid input");
                    display.innerText = "Invalid Signal: Please enter Red, Yellow, or Green.";
                    display.style.color = "black";
            }
        }
    </script>
</body>
</html>
